services:
  postgres:
    image: postgres:15-alpine
    container_name: softgrid_db
    environment:
      POSTGRES_DB: softgrid
      POSTGRES_USER: softgrid
      POSTGRES_PASSWORD: softgrid_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U softgrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: softgrid_backend
    environment:
      DATABASE_URL: postgresql://softgrid:softgrid_password@postgres:5432/softgrid
      JWT_SECRET: your_secret_key_here
      FLASK_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python app.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: softgrid_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
